<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>樣本 A — 3D/網格動畫 Hero</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  body{font-family:"Noto Sans TC",system-ui,sans-serif;margin:0;background:#0b1020}
  .grad-text{background:linear-gradient(120deg,#818cf8,#e879f9,#38bdf8);background-size:200% auto;
    -webkit-background-clip:text;background-clip:text;color:transparent;animation:gs 6s linear infinite}
  @keyframes gs{to{background-position:200% center}}
  .hero{position:relative;min-height:100vh;overflow:hidden;color:#fff}
  #bg{position:absolute;inset:0;width:100%;height:100%;display:block}
  .hero-content{position:relative;z-index:2}
  .btn-glow{background:linear-gradient(120deg,#6366f1,#a855f7,#0ea5e9);background-size:180% auto;
    box-shadow:0 10px 34px -6px rgba(124,77,255,.7);animation:gs 5s linear infinite}
  .seg{position:absolute;top:18px;right:18px;z-index:3;display:flex;gap:6px;background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);border-radius:99px;padding:5px;backdrop-filter:blur(8px)}
  .seg button{font-size:13px;color:#cbd5e1;border:0;background:transparent;padding:6px 12px;border-radius:99px;cursor:pointer}
  .seg button.on{background:#fff;color:#0b1020;font-weight:700}
  .chip{display:inline-flex;align-items:center;gap:8px;font-size:14px;background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(8px);padding:6px 14px;border-radius:99px}
  .dot{width:8px;height:8px;border-radius:50%;background:#34d399;box-shadow:0 0 0 0 rgba(52,211,153,.7);animation:pr 2s infinite}
  @keyframes pr{70%{box-shadow:0 0 0 8px rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}
  .statc{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(8px);
    border-radius:16px;padding:18px 12px;text-align:center}
</style>
</head>
<body>
<section class="hero">
  <canvas id="bg"></canvas>
  <div class="seg">
    <button data-m="grid" class="on">透視網格</button>
    <button data-m="particles">粒子星空</button>
    <button data-m="blobs">流動光球</button>
  </div>
  <div class="hero-content max-w-6xl mx-auto px-6 pt-24 pb-16">
    <div class="chip mb-6"><span class="dot"></span> 趙珩宇 / Henry Chao — 建國中學 生活科技教師</div>
    <h1 class="text-5xl md:text-7xl font-black leading-tight mb-6">
      生活科技 <span class="grad-text">×</span> Maker <span class="grad-text">×</span> 開源
    </h1>
    <p class="text-lg md:text-xl text-slate-300 max-w-2xl mb-9 leading-relaxed">
      把課本變成可動手玩的<b class="text-white">互動教學平台</b>、用 Three.js 做<b class="text-white">光學物理模擬</b>、
      整合開放資料打造<b class="text-white">即時資訊平台</b>、把真實空間重建成<b class="text-white">3D 數位孿生</b>。
    </p>
    <div class="flex flex-wrap gap-3 mb-14">
      <a class="btn-glow px-7 py-3.5 rounded-xl font-bold text-white">🚀 逛 7 個線上作品</a>
      <a class="px-7 py-3.5 bg-white/10 text-white border border-white/25 backdrop-blur rounded-xl font-bold">📚 教學文章 ↗</a>
    </div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-3xl">
      <div class="statc"><div class="text-3xl font-black">8</div><div class="text-sm text-slate-300 mt-1">開源專案</div></div>
      <div class="statc"><div class="text-3xl font-black">616K+</div><div class="text-sm text-slate-300 mt-1">部落格瀏覽</div></div>
      <div class="statc"><div class="text-3xl font-black">213+</div><div class="text-sm text-slate-300 mt-1">教學文章</div></div>
      <div class="statc"><div class="text-3xl font-black">8+</div><div class="text-sm text-slate-300 mt-1">教學年資</div></div>
    </div>
  </div>
</section>

<script>
const cv=document.getElementById('bg'),x=cv.getContext('2d');let W,H,mode='grid',t=0;
function size(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
addEventListener('resize',size);size();
const parts=Array.from({length:120},()=>({x:Math.random(),y:Math.random(),z:Math.random(),r:Math.random()*1.6+.4}));
const blobs=[{x:.2,y:.2,c:'#6366f1'},{x:.8,y:.3,c:'#a855f7'},{x:.5,y:.9,c:'#0ea5e9'}];
function bgFill(){x.fillStyle='#0b1020';x.fillRect(0,0,W,H);}
function grid(){
  bgFill();const vpx=W*0.5,vpy=H*0.34,horizon=vpy;
  x.strokeStyle='rgba(120,150,255,0.22)';x.lineWidth=1;
  for(let i=-20;i<=20;i++){const gx=vpx+i*60;x.beginPath();x.moveTo(gx,horizon);x.lineTo(vpx+i*900,H);x.stroke();}
  const speed=(t*0.6)%1;
  for(let k=0;k<22;k++){const p=((k+speed)/22);const yy=horizon+(H-horizon)*p*p;
    x.strokeStyle=`rgba(150,120,255,${0.05+0.28*p})`;x.beginPath();x.moveTo(0,yy);x.lineTo(W,yy);x.stroke();}
  const g=x.createRadialGradient(vpx,vpy,0,vpx,vpy,260);g.addColorStop(0,'rgba(99,102,241,.55)');g.addColorStop(1,'rgba(99,102,241,0)');
  x.fillStyle=g;x.fillRect(vpx-300,vpy-300,600,600);
}
function particles(){
  bgFill();x.fillStyle='#0b1020';x.fillRect(0,0,W,H);
  for(const p of parts){p.z-=0.0024;if(p.z<=0.02){p.z=1;p.x=Math.random();p.y=Math.random();}
    const sx=(p.x-.5)/p.z+.5,sy=(p.y-.5)/p.z+.5;if(sx<0||sx>1||sy<0||sy>1)continue;
    const a=Math.min(1,(1-p.z)*1.2),r=p.r/p.z*0.5;
    x.fillStyle=`rgba(${150+105*p.x|0},${160},255,${a})`;x.beginPath();x.arc(sx*W,sy*H,r,0,7);x.fill();}
  for(let i=0;i<parts.length;i++)for(let j=i+1;j<i+4&&j<parts.length;j++){const a=parts[i],b=parts[j];
    const ax=(a.x-.5)/a.z+.5,ay=(a.y-.5)/a.z+.5,bx=(b.x-.5)/b.z+.5,by=(b.y-.5)/b.z+.5;
    const d=Math.hypot(ax-bx,ay-by);if(d<0.08){x.strokeStyle=`rgba(120,140,255,${0.12*(1-d/0.08)})`;
      x.beginPath();x.moveTo(ax*W,ay*H);x.lineTo(bx*W,by*H);x.stroke();}}
}
function blobsDraw(){
  bgFill();
  blobs.forEach((b,i)=>{const px=(b.x+0.06*Math.sin(t*0.5+i))*W,py=(b.y+0.06*Math.cos(t*0.4+i*2))*H;
    const g=x.createRadialGradient(px,py,0,px,py,360);g.addColorStop(0,b.c+'cc');g.addColorStop(1,b.c+'00');
    x.fillStyle=g;x.fillRect(px-380,py-380,760,760);});
  x.globalAlpha=0.06;x.strokeStyle='#fff';for(let gx=0;gx<W;gx+=44){x.beginPath();x.moveTo(gx,0);x.lineTo(gx,H);x.stroke();}
  for(let gy=0;gy<H;gy+=44){x.beginPath();x.moveTo(0,gy);x.lineTo(W,gy);x.stroke();}x.globalAlpha=1;
}
function loop(){t+=0.016;if(mode==='grid')grid();else if(mode==='particles')particles();else blobsDraw();requestAnimationFrame(loop);}
loop();
document.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{mode=b.dataset.m;
  document.querySelectorAll('.seg button').forEach(z=>z.classList.remove('on'));b.classList.add('on');});
</script>
</body>
</html>
