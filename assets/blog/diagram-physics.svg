<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" font-family="'Noto Sans TC',system-ui,sans-serif">
  <defs>
    <marker id="ax" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <style>
      .t{font-weight:700;font-size:15px;fill:#0f172a}
      .s{font-size:11.5px;fill:#475569}
      .cap{font-size:12px;fill:#64748b}
      .stg{font-size:10px;font-weight:700;letter-spacing:1px;fill:#fff}
      .loop{font-size:11px;font-weight:700;fill:#0ea5e9}
    </style>
  </defs>
  <text x="450" y="24" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">互動模擬的即時資料流：拖一下滑桿，整個畫面就跟著重算</text>

  <!-- 1 slider / user input -->
  <rect x="20" y="62" width="180" height="96" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
  <rect x="20" y="62" width="180" height="22" rx="11" fill="#3b82f6"/>
  <text x="110" y="77" text-anchor="middle" class="stg">① 使用者輸入</text>
  <text x="110" y="106" text-anchor="middle" class="t">拖動參數滑桿</text>
  <text x="110" y="126" text-anchor="middle" class="s">&lt;input type="range"&gt;</text>
  <text x="110" y="143" text-anchor="middle" class="s">改 f₁ / 角度 / 溫度…</text>

  <!-- 2 physics model -->
  <rect x="250" y="62" width="190" height="96" rx="12" fill="#f5f3ff" stroke="#ddd6fe"/>
  <rect x="250" y="62" width="190" height="22" rx="11" fill="#8b5cf6"/>
  <text x="345" y="77" text-anchor="middle" class="stg">② 物理模型</text>
  <text x="345" y="106" text-anchor="middle" class="t">每幀數值積分</text>
  <text x="345" y="126" text-anchor="middle" class="s">解析式取樣 / 半隱式 Euler</text>
  <text x="345" y="143" text-anchor="middle" class="s">算出這一幀的狀態</text>

  <!-- 3 draw -->
  <rect x="490" y="62" width="190" height="96" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
  <rect x="490" y="62" width="190" height="22" rx="11" fill="#f97316"/>
  <text x="585" y="77" text-anchor="middle" class="stg">③ 重繪畫面</text>
  <text x="585" y="106" text-anchor="middle" class="t">Canvas 2D 重畫</text>
  <text x="585" y="126" text-anchor="middle" class="s">requestAnimationFrame</text>
  <text x="585" y="143" text-anchor="middle" class="s">~60 fps 逐幀更新</text>

  <!-- 4 readout -->
  <rect x="730" y="62" width="150" height="96" rx="12" fill="#f0fdf4" stroke="#bbf7d0"/>
  <rect x="730" y="62" width="150" height="22" rx="11" fill="#22c55e"/>
  <text x="805" y="77" text-anchor="middle" class="stg">④ 即時讀數</text>
  <text x="805" y="106" text-anchor="middle" class="t">公式 / 數據</text>
  <text x="805" y="126" text-anchor="middle" class="s">|f₁−f₂|、能量、</text>
  <text x="805" y="143" text-anchor="middle" class="s">座標同步顯示</text>

  <!-- forward arrows -->
  <line x1="202" y1="110" x2="248" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#ax)"/>
  <line x1="442" y1="110" x2="488" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#ax)"/>
  <line x1="682" y1="110" x2="728" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#ax)"/>

  <!-- feedback loop: animation frame back to model -->
  <path d="M585 158 L585 196 L345 196 L345 160" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ax)"/>
  <text x="465" y="213" text-anchor="middle" class="loop">每一幀回到 ②：update(dt) → draw() → 再排下一幀</text>

  <text x="450" y="240" text-anchor="middle" class="cap">純前端、無後端：滑桿一動就重算模型、重繪 Canvas、同步公式與數據，形成每秒數十次的閉環</text>
</svg>
