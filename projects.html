<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>專案展示 — 趙珩宇 Henry</title>
<meta name="description" content="開源教學專案 — 互動教學平台 / 3D 模擬器 / 即時資訊平台，全部可線上體驗">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/site.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦦</text></svg>">
</head>
<body class="bg-slate-50 text-slate-800">

<nav class="sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b border-slate-200/80">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-1 sm:gap-2">
    <a href="/" class="font-bold text-slate-900 flex items-center gap-2 mr-2">
      <span class="text-2xl">🦦</span><span class="hidden sm:inline">Henry × LivingTech</span>
    </a>
    <div class="flex-1"></div>
    <a href="/livingtech-films/" class="px-3 py-1.5 text-sm rounded-lg hover:bg-slate-100">影片</a>
    <a href="/articles.html" class="px-3 py-1.5 text-sm rounded-lg hover:bg-slate-100">教學文</a>
    <a href="/maker.html" class="px-3 py-1.5 text-sm rounded-lg hover:bg-slate-100">Maker</a>
    <a href="https://livingtech.education" target="_blank" rel="noopener" class="hidden sm:inline-block px-3 py-1.5 text-sm rounded-lg text-blue-600 hover:bg-blue-50">原站 ↗</a>
  </div>
</nav>

<header class="hero relative overflow-hidden text-white">
  <div class="hero-blob hero-blob-1"></div>
  <div class="hero-blob hero-blob-2"></div>
  <div class="hero-grid"></div>
  <div class="max-w-6xl mx-auto px-6 py-14 relative">
    <div class="text-sm text-slate-300 mb-2">GitHub @henrychao521</div>
    <h1 class="text-4xl md:text-5xl font-black mb-3">開源專案展示</h1>
    <p class="text-lg text-slate-300">互動教學平台・3D 模擬器・即時資訊平台 — 點「線上體驗」直接玩。</p>
  </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-10">

  <!-- Filter -->
  <div class="bg-white/95 backdrop-blur border border-slate-200 rounded-xl p-4 mb-8 sticky top-16 z-30 shadow-sm">
    <div class="flex flex-wrap gap-2 items-center">
      <span class="text-sm text-slate-500 mr-1">主題：</span>
      <button class="filter-tag active px-3 py-1 text-sm rounded-full border border-slate-300" data-theme="all">全部</button>
      <button class="filter-tag px-3 py-1 text-sm rounded-full border border-slate-300" data-theme="twin">🧊 3D 數位孿生</button>
      <button class="filter-tag px-3 py-1 text-sm rounded-full border border-slate-300" data-theme="teaching">🎓 互動教學</button>
      <button class="filter-tag px-3 py-1 text-sm rounded-full border border-slate-300" data-theme="sim">🔬 模擬器</button>
      <button class="filter-tag px-3 py-1 text-sm rounded-full border border-slate-300" data-theme="platform">🌐 即時平台</button>
      <button class="filter-tag px-3 py-1 text-sm rounded-full border border-slate-300" data-theme="misc">📦 其他</button>
    </div>
  </div>

  <!-- Repos grid grouped by theme -->
  <div id="projects-container">
    <div class="text-center py-12 text-slate-400">⏳ 從 GitHub 拉取中...</div>
  </div>

  <p class="text-sm text-slate-400 mt-6">
    ※ 此頁即時列出 GitHub 上的公開 repo；私有的開發中專案不在此列。
  </p>
</main>

<footer class="bg-slate-950 text-slate-400 mt-16">
  <div class="max-w-6xl mx-auto px-6 py-8 text-sm text-center">
    <a href="https://github.com/henrychao521" target="_blank" rel="noopener" class="hover:text-white">GitHub @henrychao521 ↗</a>
    · <a href="https://henrylivingtech.com" target="_blank" rel="noopener" class="hover:text-white">henrylivingtech.com ↗</a>
    · <a href="https://livingtech.education" target="_blank" rel="noopener" class="hover:text-white">livingtech.education ↗</a>
  </div>
</footer>

<script src="/assets/js/shared.js"></script>
<script>
let allRepos = [];
let currentTheme = getQuery('theme') || 'all';

async function loadProjects() {
  allRepos = await fetchGHReposSafe();
  render();
}

function render() {
  const container = document.getElementById('projects-container');
  const themes = currentTheme === 'all'
    ? ['twin', 'teaching', 'sim', 'platform', 'misc']
    : [currentTheme];

  let html = '';
  for (const theme of themes) {
    const repos = allRepos
      .filter(r => !r.fork || PROJECT_META[r.name])  // fork 只留有標注的
      .filter(r => (PROJECT_META[r.name]?.theme || 'misc') === theme)
      .sort((a, b) => {
        const ai = FEATURED_ORDER.indexOf(a.name), bi = FEATURED_ORDER.indexOf(b.name);
        if (ai !== -1 || bi !== -1) return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
        return new Date(b.pushed_at) - new Date(a.pushed_at);
      });
    if (repos.length === 0) continue;
    html += `<section class="mb-12">
      <h2 class="text-2xl font-black text-slate-900 mb-5 flex items-center gap-2">
        ${THEME_NAMES[theme]} <span class="text-sm font-normal text-slate-500">(${repos.length})</span>
      </h2>
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-5">
        ${repos.map(repoCard).join('')}
      </div>
    </section>`;
  }
  container.innerHTML = html || '<div class="text-center py-12 text-slate-400">沒有符合的專案</div>';
}

function repoCard(repo) {
  const meta = PROJECT_META[repo.name] || {};
  const lang = repo.language || 'Other';
  const featured = meta.featured ? `<span class="text-[10px] px-2 py-0.5 rounded-full bg-amber-100 text-amber-800 font-semibold">⭐ 精選</span>` : '';
  const title = meta.title || repo.name;
  const blurb = meta.blurb || repo.description || '（尚無描述）';
  return `
    <article class="featured-card bg-white border-2 ${THEME_COLORS[meta.theme] || 'border-slate-200'} rounded-2xl p-5 flex flex-col">
      <div class="flex items-start justify-between mb-3">
        <div class="text-4xl">${meta.emoji || '📦'}</div>
        <div class="flex items-center gap-1.5">${featured}
          <span class="text-xs px-2 py-0.5 rounded bg-slate-100 text-slate-600 inline-flex items-center gap-1"><span class="lang-dot lang-${lang.replace('+','p')}"></span>${lang}</span>
        </div>
      </div>
      <div class="font-bold text-slate-900 mb-0.5">${title}</div>
      <div class="text-xs text-slate-400 mb-2 break-all">${repo.name}</div>
      <div class="text-sm text-slate-600 leading-relaxed mb-4 flex-1">${blurb}</div>
      ${(meta.tags && meta.tags.length) ? `<div class="flex flex-wrap gap-1.5 mb-4">${meta.tags.map(t => `<span class="text-[11px] px-2 py-0.5 rounded-full bg-slate-100 text-slate-600">${t}</span>`).join('')}</div>` : ''}
      <div class="flex items-center gap-2 mb-3">
        ${meta.demo ? `<a href="${meta.demo}" target="_blank" rel="noopener" class="flex-1 text-center text-sm font-semibold px-3 py-2 rounded-lg bg-slate-900 text-white hover:bg-indigo-600 transition">🚀 線上體驗</a>` : ''}
        <a href="${repo.html_url}" target="_blank" rel="noopener" class="${meta.demo ? '' : 'flex-1 text-center '}text-sm font-medium px-3 py-2 rounded-lg border border-slate-300 text-slate-700 hover:border-slate-900 hover:text-slate-900 transition">GitHub</a>
      </div>
      <div class="flex items-center gap-3 text-xs text-slate-400 pt-3 border-t border-slate-100">
        <span>★ ${repo.stargazers_count}</span>
        <span>更新 ${formatDate(repo.pushed_at)}</span>
      </div>
    </article>
  `;
}

document.querySelectorAll('.filter-tag').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.filter-tag').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTheme = btn.dataset.theme;
    history.replaceState({}, '', currentTheme === 'all' ? '/projects.html' : `/projects.html?theme=${currentTheme}`);
    render();
  };
});

// Set active filter from query param on load
document.addEventListener('DOMContentLoaded', () => {
  const initBtn = document.querySelector(`.filter-tag[data-theme="${currentTheme}"]`);
  if (initBtn) {
    document.querySelectorAll('.filter-tag').forEach(b => b.classList.remove('active'));
    initBtn.classList.add('active');
  }
  loadProjects();
});
</script>
</body>
</html>
