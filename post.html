<script src="/assets/js/shared.js"></script>
<script>
async function loadPost() {
  const slug = getQuery('slug');
  if (!slug) {
    document.getElementById('error-state').classList.remove('hidden');
    return;
  }

  // Sanitize slug to prevent path traversal
  if (!/^[a-z0-9\-]+$/i.test(slug)) {
    document.getElementById('error-title').textContent = '無效的文章 slug';
    document.getElementById('error-state').classList.remove('hidden');
    return;
  }

  try {
    // Try maker first, then blog
    let url = `/posts/maker/${slug}.md`;
    let res = await fetch(url);
    if (!res.ok) {
      url = `/posts/blog/${slug}.md`;
      res = await fetch(url);
    }
    if (!res.ok) throw new Error('找不到此文章');

    const raw = await res.text();
    const { frontmatter, body } = parseFrontmatter(raw);

    // Render
    document.getElementById('page-title').textContent = `${frontmatter.title} — Henry × LivingTech`;
    document.getElementById('article-title').textContent = frontmatter.title || '(無標題)';
    document.getElementById('article-date').textContent = formatDate(frontmatter.date);
    document.getElementById('article-author').textContent = frontmatter.author || 'Henry';
    document.getElementById('article-level').textContent = frontmatter.level || '';
    document.getElementById('article-hours').textContent = frontmatter.hours ? `⏱ ${frontmatter.hours}` : '';

    if (frontmatter.categories) {
      document.getElementById('article-categories').innerHTML =
        frontmatter.categories.map(c => `<span class="px-2 py-0.5 rounded-full bg-white/15 text-xs">${c}</span>`).join('');
    }

    if (frontmatter.repo) {
      document.getElementById('repo-banner').classList.remove('hidden');
      document.getElementById('repo-name').textContent = frontmatter.repo;
      document.getElementById('repo-link').href = `https://github.com/henrychao521/${frontmatter.repo}`;
    }

    document.getElementById('article-body').innerHTML = marked.parse(body);

    // 返回連結依文章所屬集合切換（blog → 教學文章；maker → Maker 教案）
    const isBlog = url.includes('/posts/blog/');
    const backLink = document.getElementById('back-link');
    if (backLink) {
      backLink.href = isBlog ? '/articles.html' : '/maker.html';
      backLink.textContent = isBlog ? '← 回教學文章' : '← 回 Maker 教案';
    }

    // Edit link
    document.getElementById('edit-link').href =
      `https://github.com/henrychao521/henrychao521.github.io/edit/main${url}`;

    document.getElementById('article').classList.remove('hidden');
  } catch (e) {
    document.getElementById('error-message').textContent = e.message;
    document.getElementById('error-state').classList.remove('hidden');
  }
}

function parseFrontmatter(raw) {
  const match = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (!match) return { frontmatter: {}, body: raw };
  try {
    const frontmatter = jsyaml.load(match[1]) || {};
    const body = match[2];
    return { frontmatter, body };
  } catch (e) {
    return { frontmatter: {}, body: raw };
  }
}

document.addEventListener('DOMContentLoaded', loadPost);
</script>
